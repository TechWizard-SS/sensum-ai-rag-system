# ========================================================
# 1. ОСНОВНЫЕ ДИНАМИЧЕСКИЕ НАСТРОЙКИ (ЧЕРЕЗ ЛАУНЧЕР)
# ========================================================

# База данных
spring.datasource.url=${APP_DB_URL}
spring.datasource.username=${APP_DB_USER}
spring.datasource.password=${APP_DB_PASS}

# Хранилище Supabase
supabase.url=${APP_SB_URL}
supabase.key=${APP_SB_KEY}
supabase.bucket=${APP_SB_BUCKET}

# Интеллект (OpenRouter / OpenAI)
spring.ai.openai.api-key=${APP_AI_KEY}
spring.ai.openai.base-url=${APP_AI_BASE_URL:https://openrouter.ai/api}

# Реранкер (Cohere)
cohere.api.key=${APP_COHERE_KEY:}

# Модели по умолчанию (если не заданы в UI)
spring.ai.openai.chat.options.model=${APP_AI_MODEL:qwen/qwen3.7-plus}
spring.ai.openai.embedding.options.model=${APP_EMBEDDING_MODEL:openai/text-embedding-ada-002}

# ========================================================
# 2. СИСТЕМНЫЕ НАСТРОЙКИ (ФИКСИРОВАННЫЕ)
# ========================================================

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.ai.vectorstore.pgvector.initialize-schema=true

# Кодировка и сервер
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Загрузка файлов
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=300MB

# Логирование
logging.level.org.springframework.ai=INFO
logging.level.com.rag_project=DEBUG

app.ai.site-url=https://sensum-ai.local
app.ai.name=Sensum AI